services:
  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  backend:
    build:
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/app
      - backend_obj:/app/Greenello.API/obj
      - backend_bin:/app/Greenello.API/bin
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"

  postgres:
    ports:
      - "5432:5432"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  frontend_node_modules:
  backend_obj:
  backend_bin:
